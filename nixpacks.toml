[phases.setup]
aptPkgs = [
    # Dépendances pour GLib, GObject, GIO (libglib, libgobject, libgio)
    "libglib2.0-0",
    "libgobject-2.0-0",
    
    # Dépendances pour la sécurité réseau (libnspr4, libnss3)
    "libnspr4",
    "libnss3",
    
    # Dépendances pour la communication système (libdbus)
    "libdbus-1-3",
    "libdbus-glib-1-2",
    
    # Dépendances pour l'interface graphique et l'accessibilité (libatk, libgtk, atspi)
    "libatk1.0-0",
    "libatk-bridge2.0-0",
    "libatspi2.0-0",
    "libgtk-3-0",
    
    # Dépendances pour le rendu graphique X11 (libX*)
    "libx11-6",
    "libx11-xcb1",
    "libxcb1",
    "libxcomposite1",
    "libxcursor1",
    "libxdamage1",
    "libxext6",
    "libxfixes3",
    "libxi6",
    "libxrandr2",
    "libxrender1",
    "libxtst6",

    # Dépendances diverses (expat, fontconfig, pango)
    "libexpat1",
    "libfontconfig1",
    "libpango-1.0-0",
    
    # Dépendances pour le son et le multimédia (libasound, libgbm)
    "libasound2",
    "libgbm1",
    "libxkbcommon0"
]
